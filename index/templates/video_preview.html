<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>视频预览</title>
    <style>
        body { margin: 0; min-height: 100vh; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f172a; color: #f8fafc; display: flex; justify-content: center; align-items: center; }
        .preview-container { width: 100%; max-width: 980px; padding: 24px; box-sizing: border-box; }
        .preview-header { display: flex; justify-content: space-between; align-items: center; gap: 16px; flex-wrap: wrap; margin-bottom: 18px; }
        .preview-header h1 { margin: 0; font-size: 1.5rem; }
        .preview-description { color: #cbd5e1; margin: 0; }
        .video-box { position: relative; background: #020617; border-radius: 20px; overflow: hidden; }
        video { width: 100%; height: auto; max-height: 70vh; background: #000; }
        .preview-actions { margin-top: 14px; display: flex; flex-wrap: wrap; gap: 10px; }
        .btn { display: inline-block; padding: 12px 18px; border-radius: 999px; background: #38bdf8; color: #0f172a; font-weight: 700; text-decoration: none; }
        .btn-secondary { background: #94a3b8; color: #0f172a; }
        .note { margin-top: 12px; color: #cbd5e1; font-size: 0.95rem; }
    </style>
</head>
<body>
    <div class="preview-container">
        <div class="preview-header">
            <div>
                <h1>视频预览</h1>
            </div>
            <a class="btn btn-secondary" href="{% url 'index:videos' %}">返回视频库</a>
        </div>
        <div class="video-box">
            <video controls preload="none" playsinline poster="{{ thumbnail_path }}">
                <source src="{{ video_src }}" type="video/mp4">
                您的浏览器不支持视频预览。
            </video>
        </div>
        <div class="preview-actions">
            <a class="btn" href="{{ download_url }}">下载 / 观看完整视频</a>
        </div>
    </div>
</body>
</html>
