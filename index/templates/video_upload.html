<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>视频上传</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f172a; color: #f8fafc; }
        .container { max-width: 820px; margin: 0 auto; padding: 32px 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .header a { color: #38bdf8; text-decoration: none; }
        .box { background: rgba(15, 23, 42, 0.96); border-radius: 24px; padding: 28px; }
        .box h1 { margin-top: 0; }
        .actions { display: flex; flex-wrap: wrap; gap: 16px; margin-top: 18px; }
        input[type=file] { display: block; width: 100%; padding: 12px; border-radius: 14px; border: 1px solid #334155; color: #f8fafc; background: #0f172a; }
        button { border: none; border-radius: 999px; padding: 12px 24px; background: #38bdf8; color: #0f172a; cursor: pointer; font-weight: 700; }
        .progress-bar { width: 100%; height: 12px; background: #334155; border-radius: 999px; overflow: hidden; margin-top: 16px; display: none; }
        .bar { width: 0; height: 100%; background: #38bdf8; transition: width 0.2s ease; }
        #status { margin-top: 16px; color: #cbd5e1; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h1>视频上传</h1>
                <p>请上传毕业视频。</p>
            </div>
            <div style="display:flex;gap:12px;align-items:center;">
                <a href="{% url 'index:delete_files' %}" style="color:#f472b6; text-decoration:none;">管理我的上传</a>
                <a href="{% url 'index:home' %}">返回首页</a>
            </div>
        </div>
        <div class="box">
            <form id="videoUploadForm" method="POST" enctype="multipart/form-data">
                {% csrf_token %}
                <input name="videos" type="file" accept="video/*" multiple required />
                <div class="actions">
                    <button type="submit">上传视频</button>
                </div>
            </form>
            <div class="progress-bar" id="progressBar"><div class="bar" id="uploadProgress"></div></div>
            {% if message %}
                <div id="message" style="margin-top:16px;color:#fda4af;font-weight:700;">{{ message }}</div>
            {% endif %}
            <div id="status">请选择视频后点击上传。</div>
        </div>
    </div>
    <script>
        const uploadForm = document.getElementById('videoUploadForm');
        const status = document.getElementById('status');
        const progressBar = document.getElementById('progressBar');
        const uploadProgress = document.getElementById('uploadProgress');
        const fileInput = uploadForm.querySelector('input[type=file]');
        const CHUNK_SIZE = 8 * 1024 * 1024; // 8MB

        uploadForm.addEventListener('submit', async (event) => {
            event.preventDefault();
            const files = Array.from(fileInput.files);
            if (files.length === 0) {
                return;
            }

            const totalSize = files.reduce((sum, file) => sum + file.size, 0);
            let uploadedSize = 0;

            status.textContent = '正在上传视频，请稍候...';
            progressBar.style.display = 'block';
            uploadProgress.style.width = '0%';

            try {
                for (let i = 0; i < files.length; i++) {
                    const file = files[i];
                    status.textContent = `上传中：${i + 1}/${files.length} ${file.name}`;
                    await uploadVideoFile(file, (bytes) => {
                        uploadedSize += bytes;
                        const percent = totalSize > 0 ? Math.round((uploadedSize / totalSize) * 100) : 0;
                        uploadProgress.style.width = percent + '%';
                        status.textContent = `上传进度：${percent}% (${i + 1}/${files.length})`;
                    });
                }
                status.textContent = '所有视频已上传成功。';
            } catch (err) {
                status.textContent = err.message || '视频上传失败，请重试。';
            } finally {
                progressBar.style.display = 'none';
            }
        });

        async function uploadVideoFile(file, onProgress) {
            const csrfToken = document.querySelector('input[name="csrfmiddlewaretoken"]')?.value || getCookie('csrftoken');
            const fileId = `${file.name}-${file.size}-${file.lastModified}-${Math.random().toString(36).slice(2, 10)}`;
            const totalChunks = Math.ceil(file.size / CHUNK_SIZE);

            for (let chunkIndex = 0; chunkIndex < totalChunks; chunkIndex++) {
                const start = chunkIndex * CHUNK_SIZE;
                const end = Math.min(file.size, start + CHUNK_SIZE);
                const chunk = file.slice(start, end);
                await uploadVideoChunk(file, fileId, chunkIndex, totalChunks, chunk, csrfToken);
                if (typeof onProgress === 'function') {
                    onProgress(chunk.size);
                }
            }

            await mergeVideoChunks(fileId, file.name, csrfToken);
        }

        function uploadVideoChunk(file, fileId, chunkIndex, totalChunks, chunk, csrfToken) {
            return new Promise((resolve, reject) => {
                const formData = new FormData();
                formData.append('chunk', chunk);
                formData.append('file_name', file.name);
                formData.append('file_id', fileId);
                formData.append('chunk_index', chunkIndex);
                formData.append('total_chunks', totalChunks);
                formData.append('media_type', 'video');
                if (csrfToken) {
                    formData.append('csrfmiddlewaretoken', csrfToken);
                }

                const xhr = new XMLHttpRequest();
                xhr.open('POST', "{% url 'index:upload_chunk' %}");
                if (csrfToken) {
                    xhr.setRequestHeader('X-CSRFToken', csrfToken);
                }
                xhr.onload = () => {
                    if (xhr.status === 200) {
                        resolve();
                    } else {
                        reject(new Error(`分片上传失败：${xhr.status} ${xhr.statusText}`));
                    }
                };
                xhr.onerror = () => reject(new Error('分片上传请求失败，请检查网络。'));
                xhr.send(formData);
            });
        }

        function mergeVideoChunks(fileId, fileName, csrfToken) {
            return new Promise((resolve, reject) => {
                const xhr = new XMLHttpRequest();
                xhr.open('POST', "{% url 'index:merge_chunks' %}");
                xhr.setRequestHeader('Content-Type', 'application/json');
                if (csrfToken) {
                    xhr.setRequestHeader('X-CSRFToken', csrfToken);
                }
                xhr.onload = () => {
                    if (xhr.status === 200) {
                        try {
                            const response = JSON.parse(xhr.responseText);
                            if (response.status === 'success') {
                                resolve(response);
                            } else {
                                reject(new Error(response.message || '视频合并失败。'));
                            }
                        } catch (err) {
                            reject(new Error('视频合并响应解析失败。'));
                        }
                    } else {
                        reject(new Error(`视频合并失败：${xhr.status} ${xhr.statusText}`));
                    }
                };
                xhr.onerror = () => reject(new Error('视频合并请求失败，请检查网络。'));
                xhr.send(JSON.stringify({ file_id: fileId, file_name: fileName, media_type: 'video' }));
            });
        }

        function getCookie(name) {
            const value = `; ${document.cookie}`;
            const parts = value.split(`; ${name}=`);
            if (parts.length === 2) return parts.pop().split(';').shift();
            return '';
        }
    </script>
</body>
</html>
