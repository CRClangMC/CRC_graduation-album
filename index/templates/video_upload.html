<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>视频上传</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f172a; color: #f8fafc; }
        .container { max-width: 820px; margin: 0 auto; padding: 32px 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .header a { color: #38bdf8; text-decoration: none; }
        .box { background: rgba(15, 23, 42, 0.96); border-radius: 24px; padding: 28px; }
        .box h1 { margin-top: 0; }
        .actions { display: flex; flex-wrap: wrap; gap: 16px; margin-top: 18px; }
        input[type=file] { display: block; width: 100%; padding: 12px; border-radius: 14px; border: 1px solid #334155; color: #f8fafc; background: #0f172a; }
        button { border: none; border-radius: 999px; padding: 12px 24px; background: #38bdf8; color: #0f172a; cursor: pointer; font-weight: 700; }
        .progress-bar { width: 100%; height: 12px; background: #334155; border-radius: 999px; overflow: hidden; margin-top: 16px; display: none; }
        .bar { width: 0; height: 100%; background: #38bdf8; transition: width 0.2s ease; }
        #status { margin-top: 16px; color: #cbd5e1; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h1>视频上传</h1>
                <p>请上传毕业视频，系统会保存到 /static/vdo/ 并写入视频数据库。</p>
            </div>
            <a href="{% url 'index:home' %}">返回首页</a>
        </div>
        <div class="box">
            <form id="videoUploadForm" method="POST" enctype="multipart/form-data">
                {% csrf_token %}
                <input name="videos" type="file" accept="video/*" multiple required />
                <div class="actions">
                    <button type="submit">上传视频</button>
                </div>
            </form>
            <div class="progress-bar" id="progressBar"><div class="bar" id="uploadProgress"></div></div>
            <div id="status">请选择视频后点击上传。</div>
        </div>
    </div>
    <script>
        const form = document.getElementById('videoUploadForm');
        const status = document.getElementById('status');
        const progressBar = document.getElementById('progressBar');
        const uploadProgress = document.getElementById('uploadProgress');

        form.addEventListener('submit', (event) => {
            event.preventDefault();
            const formData = new FormData(form);
            status.textContent = '正在上传视频，请稍候...';
            progressBar.style.display = 'block';
            uploadProgress.style.width = '0%';

            const xhr = new XMLHttpRequest();
            xhr.open('POST', "{% url 'index:upload_video' %}");
            xhr.setRequestHeader('X-CSRFToken', getCookie('csrftoken'));

            xhr.upload.onprogress = (event) => {
                if (event.lengthComputable) {
                    const percent = Math.round((event.loaded / event.total) * 100);
                    uploadProgress.style.width = percent + '%';
                    status.textContent = `上传进度：${percent}%`;
                }
            };

            xhr.onload = () => {
                progressBar.style.display = 'none';
                try {
                    const result = JSON.parse(xhr.responseText);
                    if (result.status === 'success') {
                        status.textContent = '视频上传成功。';
                    } else {
                        status.textContent = result.message || '视频上传失败。';
                    }
                } catch (err) {
                    status.textContent = '上传响应解析失败。';
                }
            };

            xhr.onerror = () => {
                progressBar.style.display = 'none';
                status.textContent = '视频上传请求失败，请检查网络。';
            };

            xhr.send(formData);
        });

        function getCookie(name) {
            const value = `; ${document.cookie}`;
            const parts = value.split(`; ${name}=`);
            if (parts.length === 2) return parts.pop().split(';').shift();
            return '';
        }
    </script>
</body>
</html>
